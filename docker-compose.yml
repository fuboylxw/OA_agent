version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: uniflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-uniflow_oa}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: uniflow-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: uniflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    container_name: uniflow-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-uniflow_oa}?schema=public&connection_limit=20&pool_timeout=10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      API_PORT: 3001
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_MODE: ${AUTH_MODE:-legacy}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-}
      AUTH_OAUTH2_BASE_URL: ${AUTH_OAUTH2_BASE_URL:-}
      AUTH_OAUTH2_SCOPE: ${AUTH_OAUTH2_SCOPE:-client}
      AUTH_OAUTH2_REDIRECT_URI: ${AUTH_OAUTH2_REDIRECT_URI:-}
      AUTH_OAUTH2_CLIENT_ID: ${AUTH_OAUTH2_CLIENT_ID:-}
      AUTH_OAUTH2_CLIENT_SECRET: ${AUTH_OAUTH2_CLIENT_SECRET:-}
      AUTH_OAUTH2_AUTHORIZE_URL: ${AUTH_OAUTH2_AUTHORIZE_URL:-}
      AUTH_OAUTH2_TOKEN_URL: ${AUTH_OAUTH2_TOKEN_URL:-}
      AUTH_OAUTH2_USERINFO_URL: ${AUTH_OAUTH2_USERINFO_URL:-}
      AUTH_OAUTH2_LOGOUT_URL: ${AUTH_OAUTH2_LOGOUT_URL:-}
      AUTH_OAUTH2_STATE_SECRET: ${AUTH_OAUTH2_STATE_SECRET:-}
      AUTH_OAUTH2_ADMIN_USERNAMES: ${AUTH_OAUTH2_ADMIN_USERNAMES:-}
      AUTH_OAUTH2_ADMIN_USER_IDS: ${AUTH_OAUTH2_ADMIN_USER_IDS:-}
      AUTH_OAUTH2_FLOW_MANAGER_USERNAMES: ${AUTH_OAUTH2_FLOW_MANAGER_USERNAMES:-}
      AUTH_OAUTH2_FLOW_MANAGER_USER_IDS: ${AUTH_OAUTH2_FLOW_MANAGER_USER_IDS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default-tenant}
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/apps/api/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        NODE_ENV: production
    container_name: uniflow-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-uniflow_oa}?schema=public&connection_limit=10&pool_timeout=10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default-tenant}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://api:3001}
        NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-legacy}
        NEXT_PUBLIC_AUTH_PROVIDER_NAME: ${NEXT_PUBLIC_AUTH_PROVIDER_NAME:-}
    container_name: uniflow-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://api:3001}
      NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-legacy}
      NEXT_PUBLIC_AUTH_PROVIDER_NAME: ${NEXT_PUBLIC_AUTH_PROVIDER_NAME:-}
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - uniflow-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  uniflow-network:
    driver: bridge
